name: Actualizar PLN Feeds

on:
  # Corre automáticamente cada 6 horas
  schedule:
    - cron: '0 */6 * * *'

  # Permite correrlo manualmente desde GitHub → Actions → "Run workflow"
  workflow_dispatch:

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necesario para hacer commit del feeds.json

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configurar Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Instalar dependencias
        run: pip install -r scripts/requirements.txt

      - name: Ejecutar scraper de feeds
        run: python3 scripts/fetch_feeds.py

      - name: Commit y push de feeds.json actualizado
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/feeds.json
          # Solo hace commit si el archivo cambió
          git diff --cached --quiet || git commit -m "chore: actualizar PLN feeds [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
